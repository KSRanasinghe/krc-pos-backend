services:
  postgres:
    image: postgres:16
    container_name: krc_postgres
    environment:
      POSTGRES_DB: krc_pos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 8080
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: krc_pos_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/krc_pos_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 8080
      JWT_SECRET: vJ8xVZKoECDSP4lnOlc2X4Rzyeo_3j2fFeFTFXCbg_s
    depends_on:
      - postgres

volumes:
  postgres_data: